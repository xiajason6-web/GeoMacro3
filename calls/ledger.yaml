# PUBLIC CALLS LEDGER — append-only, git-timestamped.
#
# Rules of the ledger:
#   - Calls are added with the model probability AT TIME OF CALL and explicit,
#     Polymarket-grade resolution criteria checkable from this repo's own data
#     lake (PortWatch transits, coded events). Git history is the timestamp.
#   - NEVER edit or delete a call after commit. Corrections = a new call.
#   - Grading is automatic (src/report/calls.py, run in every make refresh).
#   - Brier score reported on all resolved calls (0 = perfect, 0.25 = coin-flip
#     on 50/50 calls; lower is better).
#
# Criteria types the grader understands:
#   portwatch_ma7_gte: {threshold, by}  — YES if Hormuz 7d-avg transit calls
#       >= threshold on ANY date between made and by (mirrors Polymarket's
#       "traffic returns to normal" resolution source and wording)
#   coded_event: {rung, target_types (opt), by} — YES if any coded event with
#       that rung (and target type, if given) occurs after made and by the date.
#       Caveat: self-graded via this repo's LLM coder; criteria text is frozen.

